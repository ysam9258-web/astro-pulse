<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroPulse | Name Your Star</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Montserrat", system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: #ffffff;
      background: radial-gradient(circle at top, #1b245c 0%, #080b1f 45%, #02030a 100%);
    }

    .stars, .stars2 {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(#ffffff 1px, transparent 1px),
        radial-gradient(#8bd3ff 1px, transparent 1px);
      background-size: 70px 70px, 120px 120px;
      animation: drift 55s linear infinite;
      opacity: 0.55;
      z-index: 0;
    }

    .stars2 {
      background-size: 140px 140px;
      animation-duration: 90s;
      opacity: 0.3;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-700px); }
    }

    .glow {
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(122,92,255,0.65), transparent 70%);
      filter: blur(35px);
      right: -80px;
      top: 120px;
      animation: pulse 5s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.18); opacity: 1; }
    }

    header {
      position: relative;
      z-index: 2;
      padding: 24px 7%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .logo span {
      color: #7ddcff;
      text-shadow: 0 0 18px #7ddcff;
    }

    .badge {
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      font-size: 13px;
      color: #c9d6ff;
    }

    main {
      position: relative;
      z-index: 2;
      min-height: calc(100vh - 84px);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 40px;
      padding: 30px 7% 70px;
    }

    .hero h1 {
      font-size: clamp(42px, 8vw, 86px);
      line-height: 0.95;
      letter-spacing: -3px;
      margin-bottom: 22px;
    }

    .hero h1 span {
      background: linear-gradient(90deg, #7ddcff, #b792ff, #ffffff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      max-width: 560px;
      color: #c8d0ff;
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 15px 22px;
      border-radius: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #061021;
      background: linear-gradient(135deg, #7ddcff, #b792ff);
      box-shadow: 0 0 35px rgba(125,220,255,0.35);
    }

    .btn.secondary {
      color: #ffffff;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: none;
    }

    .visual {
      min-height: 430px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .planet {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #ffffff, #7ddcff 12%, #3540d4 35%, #10134b 65%, #050617 100%);
      box-shadow:
        0 0 70px rgba(125,220,255,0.55),
        inset -35px -40px 55px rgba(0,0,0,0.55);
      animation: float 4.5s ease-in-out infinite;
      position: relative;
    }

    .planet::after {
      content: "";
      position: absolute;
      width: 390px;
      height: 90px;
      border: 2px solid rgba(255,255,255,0.32);
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(-18deg);
      box-shadow: 0 0 24px rgba(125,220,255,0.4);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(3deg); }
    }

    .card {
      position: absolute;
      bottom: 12px;
      width: min(360px, 92%);
      padding: 22px;
      border-radius: 26px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 70px rgba(0,0,0,0.35);
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    .card p {
      color: #c8d0ff;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 13px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.25);
      color: white;
      outline: none;
    }

    .small-btn {
      padding: 13px 15px;
      border-radius: 14px;
      border: none;
      background: #ffffff;
      font-weight: 800;
      cursor: pointer;
    }

    .result {
      margin-top: 12px;
      color: #7ddcff;
      font-size: 13px;
      min-height: 18px;
    }

    @media (max-width: 850px) {
      header {
        padding: 20px;
      }

      main {
        grid-template-columns: 1fr;
        padding: 24px 20px 60px;
        text-align: left;
      }

      .hero h1 {
        letter-spacing: -1.5px;
      }

      .visual {
        min-height: 430px;
      }

      .planet {
        width: 230px;
        height: 230px;
      }

      .planet::after {
        width: 315px;
      }

      .badge {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="glow"></div>

  <header>
    <div class="logo">Astro<span>Pulse</span></div>
    <div class="badge">Premium Star Naming Experience</div>
  </header>

  <main>
    <section class="hero">
      <h1>Name a <span>Star</span><br>Forever.</h1>
      <p>
        Create a magical cosmic memory with AstroPulse. Enter a name, generate a premium star identity,
        and experience a dreamy sky-inspired digital moment.
      </p>

      <div class="buttons">
        <button class="btn" onclick="scrollToCard()">Start Naming</button>
        <button class="btn secondary">Explore Stars</button>
      </div>
    </section>

    <section class="visual">
      <div class="planet"></div>

      <div class="card" id="starCard">
        <h3>Create Your Star</h3>
        <p>Type a name and generate your first AstroPulse star preview.</p>

        <div class="input-row">
          <input id="nameInput" type="text" placeholder="Enter name..." />
          <button class="small-btn" onclick="generateStar()">Go</button>
        </div>

        <div class="result" id="resultText"></div>
      </div>
    </section>
  </main>

  <script>
    function generateStar() {
      const name = document.getElementById("nameInput").value.trim();
      const result = document.getElementById("resultText");

      if (!name) {
        result.innerText = "Please enter a name first.";
        return;
      }

      const starId = "AP-" + Math.floor(100000 + Math.random() * 900000);
      result.innerText = name + "'s star has been generated • ID: " + starId;
    }

    function scrollToCard() {
      document.getElementById("starCard").scrollIntoView({ behavior: "smooth" });
    }
  </script>
</body>
</html>
